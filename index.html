<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Comprog Reviewer ni Kerr Boy</title>
<style>
  :root{
    --bg:#0d0f14; --card:#151821; --accent:#1e90ff; --accent-glow:0 0 12px #1e90ff;
    --text:#e9ecf2; --muted:#9aa3b2; --radius:10px;
  }
  body{background:var(--bg);color:var(--text);font-family:"Segoe UI",Arial,sans-serif;margin:0;padding:28px;}
  .wrap{max-width:980px;margin:0 auto;background:var(--card);padding:28px;border-radius:14px;
        box-shadow:0 10px 40px rgba(0,0,0,.6);border:1px solid #232734;}
  h1{margin:0 0 18px 0;color:var(--accent);text-shadow:var(--accent-glow);text-align:center;}
  .meta{color:var(--muted);text-align:center;margin-bottom:18px;}
  .q{background:#141822;padding:14px;border-radius:10px;margin-bottom:12px;border-left:4px solid var(--accent);
     transition:.12s;box-shadow:0 6px 18px rgba(0,0,0,.4);}
  .q:hover{transform:translateX(6px);box-shadow:0 12px 30px rgba(30,144,255,0.08);}
  .q strong{display:block;margin-bottom:8px;}
  .choices label{display:block;cursor:pointer;padding:6px 0;color:var(--text);}
  input[type="radio"]{transform:scale(1.15);margin-right:8px;accent-color:var(--accent);}
  .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
  button{background:var(--accent);color:#000;border:none;padding:10px 16px;border-radius:10px;cursor:pointer;
         box-shadow:var(--accent-glow);font-weight:600}
  button.secondary{background:#0b1220;color:var(--text);border:1px solid rgba(255,255,255,.04)}
  #result{margin-top:18px;font-size:20px;color:var(--accent);font-weight:700}
  #answers{margin-top:14px;background:#0f1724;padding:12px;border-radius:10px;border-left:4px solid #6df6ff;color:var(--muted)}
  .small{font-size:13px;color:var(--muted);margin-top:8px}
  @media(max-width:640px){ .wrap{padding:16px} button{width:100%} .controls{flex-direction:column} }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Comprog Reviewer ni Kerr Boy?</h1>
    <p class="meta">womp<strong>wompwomp</strong> — pang malupitang nilalang boy?</p>

    <form id="quiz"></form>

    <div class="controls">
      <button id="submitBtn" type="button">Submit mo sagot, boy?</button>
      <button id="showKeyBtn" type="button" class="secondary">Labas sagot dito, boy?</button>
      <div style="flex:1"></div>
      <div class="small">Refresh mo boy para umulit?</div>
    </div>

    <div id="result" aria-live="polite"></div>
    <div id="answers" style="display:none"></div>
  </div>

<script>
// ======= QUESTIONS (60 C++ items) =======
const questions = [
{q:"Who is the inventor of Java?", choices:["Ryan Gosling","Kerr Ramos","James Gosling","Sam Witwitcky"], correct:2},
{q:"Who is the king of TIP?", choices:["King Julius Zet Radores","Fuck Gid","Francis Henry Method","Kerr lang"], correct:3},
{q:"Who is the best AI Prompter?", choices:["Zet","Kerr","Francis Hernandez","Lim boy bakat?"], correct:2},
{q:"What is an exception in Java?", choices:["A syntax error","An event that disrupts program flow","A variable","A loop"], correct:1},
{q:"Exception handling is used to:", choices:["Stop program","Ignore errors","Handle runtime errors","Compile code"], correct:2},
{q:"Which keyword is used to handle exceptions?", choices:["try","catch","throw","All of the above"], correct:3},
{q:"A try block must be followed by:", choices:["catch or finally","loop","method","class"], correct:0},
{q:"catch block is used to:", choices:["Throw error","Handle error","Stop program","Loop code"], correct:1},
{q:"finally block executes:", choices:["Only if error occurs","Only if no error","Always","Never"], correct:2},
{q:"throw keyword is used to:", choices:["Handle error","Declare error","Create exception","Ignore error"], correct:2},
{q:"throws keyword is used to:", choices:["Throw exception","Declare exception","Handle exception","Ignore exception"], correct:1},
{q:"Checked exceptions are checked at:", choices:["Runtime","Compile time","Execution","Loop time"], correct:1},
{q:"Unchecked exceptions occur at:", choices:["Compile time","Runtime","Design time","Edit time"], correct:1},

{q:"An array is:", choices:["Collection of different types","Collection of same type","Function","Loop"], correct:1},
{q:"Array index starts at:", choices:["0","1","-1","Depends"], correct:0},
{q:"Array length is accessed by:", choices:["size()","length","count","len"], correct:1},
{q:"Which stores 100 integers?", choices:["int a;","int[] a = new int[100];","array a;","int a[100];"], correct:1},
{q:"Access first element:", choices:["a[1]","a[0]","a[-1]","a[first]"], correct:1},

{q:"2D array represents:", choices:["Line","Loop","Tree","Table"], correct:3},
{q:"Rows in 2D array accessed by:", choices:["length","[i]","[j]","index"], correct:1},
{q:"matrix.length gives:", choices:["Columns","Rows","Size","Index"], correct:1},
{q:"matrix[i].length gives:", choices:["Rows","Columns","Index","Size"], correct:1},
{q:"Ragged array means:", choices:["Equal rows","Different row lengths","Single row","Sorted array"], correct:1},

{q:"Inheritance means:", choices:["Copying code","Looping","Child inherits parent","Error handling"], correct:2},
{q:"Parent class is also called:", choices:["Superclass","Child","Object","Interface"], correct:0},
{q:"Child class is:", choices:["Superclass","Variable","Method","Subclass"], correct:3},
{q:"Keyword for inheritance:", choices:["implement","extends","inherits","super"], correct:1},
{q:"Java supports multiple inheritance?", choices:["Yes","No","Sometimes","Only interfaces"], correct:1},

{q:"Interface is:", choices:["Concrete class","Loop","Abstract contract","Variable"], correct:2},
{q:"Interface methods are:", choices:["Implemented","Abstract","Optional","Private"], correct:1},
{q:"Keyword to implement interface:", choices:["extends","implements","inherits","super"], correct:1},
{q:"A class can implement:", choices:["One interface","Two interfaces","Multiple interfaces","None"], correct:2},
{q:"Interface contains:", choices:["Variables only","Methods only","Abstract methods","Loops"], correct:2},

{q:"System.out is used for:", choices:["Input","Output","Error","Loop"], correct:1},
{q:"System.in is:", choices:["Output","Input","Error","Loop"], correct:1},
{q:"System.err is:", choices:["Input","Output","Error","Loop"], correct:2},
{q:"BufferedReader reads:", choices:["Numbers","Lines","Arrays","Files only"], correct:1},
{q:"InputStreamReader converts:", choices:["Char to byte","Byte to char","Int to string","String to int"], correct:1},

{q:"Swing is used for:", choices:["Database","GUI","Math","Networking"], correct:1},
{q:"JFrame is:", choices:["Button","Window","Text","Layout"], correct:1},
{q:"JButton is used for:", choices:["Display text","Click events","Input","Loop"], correct:1},
{q:"JTextField allows:", choices:["Multiple lines","Single line input","No input","Images"], correct:1},
{q:"JLabel displays:", choices:["Input","Text","Loop","Error"], correct:1},

{q:"Database is:", choices:["Program","Storage of data","Loop","Error"], correct:1},
{q:"DBMS stands for:", choices:["Data Base Managing System","Database Management System","Data Basic System","None"], correct:1},
{q:"Table consists of:", choices:["Rows and columns","Loops","Classes","Objects"], correct:0},
{q:"Primary key is:", choices:["Optional","Unique identifier","Loop","Function"], correct:1},
{q:"MySQL is:", choices:["Language","DBMS","Compiler","Editor"], correct:1},

{q:"JDBC stands for:", choices:["Java Data Base Connectivity","Java Database Connection","Java Data Binding Code","None"], correct:0},
{q:"JDBC connects:", choices:["Java to GUI","Java to DB","Java to loop","Java to file"], correct:1},
{q:"SQL stands for:", choices:["Structured Query Language","Simple Query Language","Standard Query List","None"], correct:0},
{q:"SELECT is used to:", choices:["Insert","Delete","Retrieve","Update"], correct:2},
{q:"INSERT is used to:", choices:["Add data","Delete data","Update data","View data"], correct:0},

{q:"UPDATE is used to:", choices:["Add","Modify","Delete","View"], correct:1},
{q:"DELETE is used to:", choices:["Remove data","Add data","Update data","View"], correct:0},
{q:"WHERE clause is used for:", choices:["Sorting","Filtering","Joining","Loop"], correct:1},
{q:"ORDER BY is used for:", choices:["Filtering","Sorting","Deleting","Joining"], correct:1},
{q:"SQL is:", choices:["Case sensitive","Love","Loop","Case insensitive"], correct:3}
];
// ===== build quiz =====
const quiz = document.getElementById('quiz');

questions.forEach((item, idx) => {
  const block = document.createElement('div');
  block.className = 'q';
  let inner = `<strong>${idx+1}. ${item.q}</strong><div class="choices">`;
  item.choices.forEach((ch,i)=> inner += `<label><input type="radio" name="q${idx}" value="${i}"> ${String.fromCharCode(65+i)}. ${ch}</label>`);
  inner += `</div>`;
  block.innerHTML = inner;
  quiz.appendChild(block);
});

// ===== submit behavior =====
const submitBtn = document.getElementById('submitBtn');
const showKeyBtn = document.getElementById('showKeyBtn');
const resultDiv = document.getElementById('result');
const answersDiv = document.getElementById('answers');

submitBtn.addEventListener('click', () => {
  // disable inputs immediately (Google Form style)
  document.querySelectorAll('input[type="radio"]').forEach(i=> i.disabled = true);
  // compute score
  let score = 0;
  questions.forEach((q, i) => {
    const sel = document.querySelector(`input[name="q${i}"]:checked`);
    const val = sel ? Number(sel.value) : null;
    if(val === q.correct) score++;
  });
  resultDiv.textContent = `Score: ${score} / ${questions.length}`;
  // hide answer key until requested (answersDiv remains hidden)
  answersDiv.style.display = 'none';
  answersDiv.innerHTML = '';
});

showKeyBtn.addEventListener('click', () => {
  // show answer key in answersDiv
  let html = '<h3>Answer Key</h3>';
  html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">';
  questions.forEach((q,i)=> {
    html += `<div><strong>${i+1}.</strong> ${String.fromCharCode(65+q.correct)}. ${q.choices[q.correct]}</div>`;
  });
  html += '</div>';
  answersDiv.innerHTML = html;
  answersDiv.style.display = 'block';
  // keep inputs disabled (if not already)
  document.querySelectorAll('input[type="radio"]').forEach(i=> i.disabled = true);
});
</script>
</body>
</html>
